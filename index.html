<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Entry Checker</title>
    <script src="https://unpkg.com/@solana/web3.js@1.98.0/lib/index.iife.min.js"></script>
    <style>
        :root {
            --bg: #0a0e27; --card: #131837; --input: #1a1f3a;
            --cyan: #00d4ff; --green: #00ff88; --orange: #ffa500; --red: #ff4d4d;
            --purple: #bf5fff; --yellow: #ffe066;
            --text-p: #e8eaf6; --text-s: #9fa8da; --border: #283593;
        }

        body { background: var(--bg); color: var(--text-p); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .dashboard { background: var(--card); width: 100%; max-width: 850px; border-radius: 20px; border: 1px solid var(--border); padding: 25px; box-shadow: 0 0 30px rgba(0,212,255,0.15); }
        
        h1 { text-align: center; font-size: 1.8rem; background: linear-gradient(135deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .section-label { color: var(--cyan); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; display: block; }
        
        textarea { 
            width: 100%; height: 140px; background: var(--input); border: 1px solid var(--border); 
            border-radius: 12px; color: var(--text-s); padding: 15px; box-sizing: border-box; 
            font-family: 'Courier New', monospace; font-size: 0.85rem; outline: none; margin-bottom: 10px;
        }

        .ca-container { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        #ca_display { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-family: monospace; color: var(--green); font-size: 0.85rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .btn-copy { background: var(--input); border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        .edit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .field-group { display: flex; flex-direction: column; }
        .field-group label { font-size: 0.6rem; color: var(--text-s); margin-bottom: 4px; text-transform: uppercase; }
        .field-group input { background: var(--input); border: 1px solid var(--border); color: var(--cyan); padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; outline: none; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0 10px; }

        .bot-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-bot {
            flex: 1; min-width: 90px; padding: 9px 10px;
            border-radius: 8px; border: none; font-weight: 700; font-size: 0.72rem;
            cursor: pointer; text-decoration: none; text-align: center; display: inline-block;
            letter-spacing: 0.5px; transition: 0.2s; text-transform: uppercase; line-height: 1.3;
        }
        .btn-bot-rick   { background: rgba(0,212,255,0.15); color: var(--cyan); border: 1px solid var(--cyan); }
        .btn-bot-soul   { background: rgba(191,95,255,0.15); color: var(--purple); border: 1px solid var(--purple); }
        .btn-bot-phanes { background: rgba(255,165,0,0.15); color: var(--orange); border: 1px solid var(--orange); }
        .btn-bot:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* ── Mobile responsiveness ── */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .dashboard { padding: 16px; border-radius: 14px; }
            h1 { font-size: 1.3rem; letter-spacing: 1px; }
            .edit-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; }
            .btn-row { grid-template-columns: 1fr; gap: 8px; }
            .btn-fetch, .btn-audit { padding: 14px; font-size: 0.9rem; }
            .main-metrics { grid-template-columns: 1fr; gap: 12px; }
            .val { font-size: 2.2rem; }
            .ca-container { flex-wrap: wrap; }
            #ca_display { font-size: 0.75rem; min-width: 0; }
            .bot-row { gap: 6px; }
            .btn-bot { font-size: 0.68rem; padding: 8px 6px; }
            .holder-addr { max-width: 80px; }
        }
        @media (max-width: 400px) {
            .edit-grid { grid-template-columns: 1fr 1fr; }
            .bot-row { flex-direction: column; }
            .btn-bot { min-width: unset; }
        }
        .btn-fetch { 
            padding: 16px; background: linear-gradient(135deg, #00d4ff, #4a9eff); color: #000; border: none;
            border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-fetch:hover { box-shadow: 0 0 20px var(--cyan); transform: scale(1.01); }
        .btn-audit { 
            padding: 16px; background: linear-gradient(135deg, #00ff88, #00c96a); color: #000; border: none;
            border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1rem;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-audit:hover { box-shadow: 0 0 20px var(--green); transform: scale(1.01); }

        .main-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .metric-box { background: var(--input); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .val { font-size: 2.8rem; font-weight: 800; display: block; line-height: 1; margin: 10px 0; }
        .eq-hint { font-size: 0.65rem; color: var(--text-s); font-family: monospace; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }

        .status-tag { font-size: 0.55rem; padding: 2px 5px; border-radius: 4px; margin-top: 2px; text-align: center; display: inline-block; font-weight: bold; }
        .tag-on { background: rgba(0,255,136,0.2); color: var(--green); }
        .tag-off { background: rgba(255,77,77,0.2); color: var(--red); }
        .tag-warn { background: rgba(255,165,0,0.2); color: var(--orange); }

        .audit-trail { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .audit-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-pass { color: var(--green); font-weight: bold; }
        .status-fail { color: var(--red); font-weight: bold; }
        
        .verdict-box { padding: 25px; border-radius: 15px; text-align: center; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; border: 2px solid transparent; }
        .go { background: rgba(0, 255, 136, 0.1); border-color: var(--green); color: var(--green); }
        .caution { background: rgba(255, 165, 0, 0.1); border-color: var(--orange); color: var(--orange); }
        .abort { background: rgba(255, 77, 77, 0.1); border-color: var(--red); color: var(--red); }

        /* Holder Breakdown */
        .holders-panel { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 20px; display: none; }
        .holders-panel.visible { display: block; }
        .holders-title { font-size: 0.75rem; color: var(--cyan); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .holders-title span { color: var(--text-s); font-weight: normal; text-transform: none; font-size: 0.7rem; }
        .holder-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.78rem; gap: 8px; }
        .holder-row:last-child { border-bottom: none; }
        .breakdown-section-label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-s); padding: 8px 0 4px; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.06); opacity: 0.7; }
        .breakdown-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
        .holder-addr { font-family: monospace; color: var(--text-s); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .holder-pct { font-weight: bold; color: var(--cyan); min-width: 50px; text-align: right; }
        .holder-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        .tag-system-bc   { background: rgba(255,77,77,0.15); color: var(--red); border: 1px solid rgba(255,77,77,0.3); }
        .tag-system-ray  { background: rgba(255,165,0,0.15); color: var(--orange); border: 1px solid rgba(255,165,0,0.3); }
        .tag-system-pswap{ background: rgba(191,95,255,0.15); color: var(--purple); border: 1px solid rgba(191,95,255,0.3); }
        .tag-retail      { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
        .holder-num { color: var(--text-s); font-size: 0.7rem; min-width: 18px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Quick Entry Checker</h1>

    <span class="section-label">1. Terminal Input (Paste Scan)</span>
    <textarea id="rawInput" placeholder="Paste Soul Scan here..." oninput="autoParse()" onpaste="handlePaste(event)"></textarea>

    <div class="ca-container">
        <div id="ca_display">No CA Detected</div>
        <button class="btn-copy" onclick="copyCA()">COPY CA</button>
    </div>

    <span class="section-label">2. Verify & Adjust Parameters</span>
    <div class="edit-grid">
        <div class="field-group"><label>Mcap ($)</label><input type="number" id="in_mc"></div>
        <div class="field-group"><label>Liq ($)</label><input type="number" id="in_liq"></div>
        <div class="field-group"><label>Vol ($)</label><input type="number" id="in_vol"></div>
        <div class="field-group"><label>Holders</label><input type="number" id="in_h"></div>
        <div class="field-group"><label>Fake Qty</label><input type="number" id="in_f_qty"></div>
        <div class="field-group"><label>Fake %</label><input type="number" id="in_f_perc"></div>
        <div class="field-group"><label>Bundle %</label><input type="number" id="in_bun_perc"></div>
        <div class="field-group"><label>Bundle Qty</label><input type="number" id="in_bun_qty"></div>
        <div class="field-group"><label>Airdrop %</label><input type="number" id="in_air"></div>
        <div class="field-group"><label>Top Holder %</label><input type="number" id="in_top1"></div>
        <div class="field-group">
            <label>Top 10 % (Retail Only)</label>
            <input type="number" id="in_top10" placeholder="0.00">
            <span id="api_status" class="status-tag tag-off">API READY</span>
        </div>
        <div class="field-group">
            <label>Mode</label>
            <select id="stage" style="background:var(--input); color:var(--cyan); border:1px solid var(--border); border-radius:4px; height: 32px; font-weight: bold;">
                <option value="bonded">Bonded</option>
                <option value="bonding">Bonding</option>
            </select>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn-fetch" onclick="fetchTopHolders()">⬇ Fetch API &amp; Smart Filter</button>
        <button class="btn-audit" onclick="runFinalAudit()">▶ Run Audit</button>
    </div>

    <div class="bot-row">
        <a id="btn_rick" class="btn-bot btn-bot-rick" href="#" target="_blank" rel="noopener" onclick="return openBot(this, 'https://t.me/RickBurpBot?start=')">🤖 Rickbot</a>
        <a id="btn_soul" class="btn-bot btn-bot-soul" href="#" target="_blank" rel="noopener" onclick="return openBot(this, 'https://t.me/soul_scanner_bot?start=')">👁 Soul Scanner</a>
        <a id="btn_phanes" class="btn-bot btn-bot-phanes" href="#" target="_blank" rel="noopener" onclick="return openBot(this, 'https://t.me/@Phanes_bot?start=')">🔮 Phanes</a>
    </div>

    <!-- Holder Breakdown Panel -->
    <div id="holders_panel" class="holders-panel">
        <div class="holders-title">
            Smart Holder Breakdown
            <span id="holders_summary"></span>
        </div>
        <div id="holders_list"></div>
    </div>

    <div class="main-metrics">
        <div class="metric-box">
            <label>Clean H/MC Ratio</label>
            <span id="hmc_val" class="val" style="color: var(--cyan);">0.00</span>
            <div id="hmc_eq" class="eq-hint">Equation Breakdown</div>
        </div>
        <div class="metric-box">
            <label>L/MC Ratio (>8%)</label>
            <span id="lmc_val" class="val">0%</span>
            <div id="lmc_eq" class="eq-hint">Equation Breakdown</div>
        </div>
    </div>

    <div class="audit-trail">
        <label>Safety Audit Checklist</label>
        <div id="audit_results"></div>
    </div>

    <div id="verdict_box" class="verdict-box">STANDBY</div>
</div>

<script>
let detectedCA = "";

// ─── Program / Authority Constants (lazy-initialized after page load) ─────────
let PUMP_PROGRAM_ID, TOKEN_PROGRAM_ID, ASSOC_TOKEN_PROGRAM_ID, PUMPSWAP_PROGRAM_ID, WSOL_MINT;
const RAYDIUM_AUTHORITY = '5Q544fKrMJu6p6mRnpCqbXmN7E4R56rM6E87t3m2n845';

window.addEventListener('load', () => {
    try {
        PUMP_PROGRAM_ID        = new solanaWeb3.PublicKey('6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P');
        TOKEN_PROGRAM_ID       = new solanaWeb3.PublicKey('TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA');
        ASSOC_TOKEN_PROGRAM_ID = new solanaWeb3.PublicKey('ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJe1bsn');
        PUMPSWAP_PROGRAM_ID    = new solanaWeb3.PublicKey('pAMMBay6oceH9fJKBRHGP5D4bD4sWpmSwMn52FMfXEA');
        WSOL_MINT              = new solanaWeb3.PublicKey('So11111111111111111111111111111111111111112');
    } catch(e) {
        console.error('Failed to init Solana constants:', e.message);
    }
});

// ─── Browser-safe byte helpers (no Node.js Buffer needed) ────────────────────
const _enc = new TextEncoder();
function strBytes(s)  { return _enc.encode(s); }          // string → Uint8Array
function u16leBytes() { return new Uint8Array([0, 0]); }  // u16 LE 0 → Uint8Array
function cmpBytes(a, b) {                                 // compare two Uint8Arrays
    for (let i = 0; i < 32; i++) {
        if (a[i] < b[i]) return -1;
        if (a[i] > b[i]) return  1;
    }
    return 0;
}

// ─── PDA / ATA Derivation ────────────────────────────────────────────────────
function getSystemAddresses(mintStr) {
    const mint = new solanaWeb3.PublicKey(mintStr);
    const mintB = mint.toBytes();

    // 1. Pump.fun Bonding Curve PDA
    //    seeds: ["bonding-curve", mint]   program: Pump.fun
    const [bondingCurve] = solanaWeb3.PublicKey.findProgramAddressSync(
        [strBytes('bonding-curve'), mintB],
        PUMP_PROGRAM_ID
    );

    // 2. Bonding Curve ATA — the token vault that appears in holder lists
    //    seeds: [bondingCurve, TOKEN_PROGRAM, mint]   program: ATA program
    const [bondingCurveATA] = solanaWeb3.PublicKey.findProgramAddressSync(
        [bondingCurve.toBytes(), TOKEN_PROGRAM_ID.toBytes(), mintB],
        ASSOC_TOKEN_PROGRAM_ID
    );

    // 3. Pumpswap Pool PDA
    //    seeds: ["pool", u16_le_0, mint0, mint1]  mints sorted ascending by bytes
    //    program: Pumpswap
    const wsolB = WSOL_MINT.toBytes();
    const [mint0B, mint1B] = cmpBytes(mintB, wsolB) <= 0
        ? [mintB, wsolB]
        : [wsolB, mintB];

    const [pumpswapPool] = solanaWeb3.PublicKey.findProgramAddressSync(
        [strBytes('pool'), u16leBytes(), mint0B, mint1B],
        PUMPSWAP_PROGRAM_ID
    );

    // 4. Pumpswap Pool token vault ATA (holds the tokens inside the pool)
    //    seeds: [pumpswapPool, TOKEN_PROGRAM, mint]   program: ATA program
    const [pumpswapVault] = solanaWeb3.PublicKey.findProgramAddressSync(
        [pumpswapPool.toBytes(), TOKEN_PROGRAM_ID.toBytes(), mintB],
        ASSOC_TOKEN_PROGRAM_ID
    );

    return {
        bondingCurve:    bondingCurve.toBase58(),
        bondingCurveATA: bondingCurveATA.toBase58(),
        pumpswapPool:    pumpswapPool.toBase58(),
        pumpswapVault:   pumpswapVault.toBase58(),
    };
}

// ─── Human-readable AMM market type labels ───────────────────────────────────
function marketLabel(type) {
    const map = {
        pump_fun_amm:  'Pumpswap Liquidity (Locked)',
        pumpFunAmm:    'Pumpswap Liquidity (Locked)',
        raydium:       'Raydium Liquidity',
        raydiumCpmm:   'Raydium CPMM Liquidity',
        raydiumAmm:    'Raydium AMM Liquidity',
        meteoraDlmm:   'Meteora DLMM Liquidity',
        meteora:       'Meteora Liquidity',
        orca:          'Orca Liquidity',
    };
    return map[type] || (type ? type + ' Liquidity' : 'AMM Liquidity');
}

// ─── Classify one holder using all available data sources ────────────────────
// h          — raw holder object from RugCheck (has .address and .owner)
// sysAddr    — our computed Pump.fun bonding curve PDA/ATA
// knownAccts — RugCheck's knownAccounts dict (address → {name, type})
// markets    — RugCheck's markets array (pool pubkeys + liquidityA/B addresses)
function classifyHolder(h, sysAddr, knownAccts, markets) {
    const addr  = h.address || '';
    const owner = h.owner   || '';

    // ── 1. Bonding curve (PDA computation is reliable; check OWNER field) ────
    if (owner === sysAddr.bondingCurve  ||
        addr  === sysAddr.bondingCurve  ||
        owner === sysAddr.bondingCurveATA ||
        addr  === sysAddr.bondingCurveATA) {
        return { isSystem: true, label: 'System: Bonding Curve', tagClass: 'tag-system-bc' };
    }

    // ── 2. RugCheck knownAccounts — covers all labeled AMM pools ─────────────
    //       (addr can itself be labeled, OR the owner wallet can be labeled)
    const knownByAddr  = knownAccts[addr]  || {};
    const knownByOwner = knownAccts[owner] || {};
    if (knownByAddr.type === 'AMM') {
        return { isSystem: true, label: `System: ${knownByAddr.name}`,  tagClass: 'tag-system-pswap' };
    }
    if (knownByOwner.type === 'AMM') {
        return { isSystem: true, label: `System: ${knownByOwner.name}`, tagClass: 'tag-system-pswap' };
    }

    // ── 3. RugCheck markets — match liquidityA/B token accounts or pool pubkey ─
    for (const mkt of markets) {
        if (addr  === mkt.liquidityA ||
            addr  === mkt.liquidityB ||
            addr  === mkt.pubkey     ||
            owner === mkt.pubkey) {
            return { isSystem: true, label: `System: ${marketLabel(mkt.marketType)}`, tagClass: 'tag-system-pswap' };
        }
    }

    // ── 4. Raydium authority fallback ─────────────────────────────────────────
    if (addr === RAYDIUM_AUTHORITY || owner === RAYDIUM_AUTHORITY) {
        return { isSystem: true, label: 'System: Raydium Liquidity', tagClass: 'tag-system-ray' };
    }

    return { isSystem: false, label: 'Retail / Trader', tagClass: 'tag-retail' };
}

// ─── Render holder breakdown panel ──────────────────────────────────────────
function renderHolderBreakdown(systemHolders, retailTop10) {
    const panel   = document.getElementById('holders_panel');
    const list    = document.getElementById('holders_list');
    const summary = document.getElementById('holders_summary');

    const retailPct = retailTop10.reduce((a, h) => a + h.pct, 0);
    summary.textContent = `${systemHolders.length} system address${systemHolders.length !== 1 ? 'es' : ''} excluded · Top 10 retail: ${retailPct.toFixed(2)}%`;

    function holderRow(h, label, tagClass, rankLabel) {
        const short   = h.address.slice(0, 6) + '…' + h.address.slice(-4);
        const tooltip = `addr:  ${h.address}\nowner: ${h.owner || 'N/A'}`;
        return `
        <div class="holder-row">
            <span class="holder-num">${rankLabel}</span>
            <span class="holder-addr" title="${tooltip}">${short}</span>
            <span class="holder-pct">${h.pct.toFixed(2)}%</span>
            <span class="holder-tag ${tagClass}">${label}</span>
        </div>`;
    }

    let html = '';

    // ── Section 1: excluded system / LP addresses ────────────────────────────
    if (systemHolders.length > 0) {
        html += `<div class="breakdown-section-label">⛔ EXCLUDED (LP / System)</div>`;
        html += systemHolders.map(h =>
            holderRow(h, h.label, h.tagClass, '—')
        ).join('');
    }

    // ── Section 2: actual top-10 retail holders ──────────────────────────────
    html += `<div class="breakdown-section-label">✅ TOP 10 RETAIL HOLDERS</div>`;
    if (retailTop10.length === 0) {
        html += `<div class="holder-row"><span style="color:#888;font-size:0.85em">No retail holders found</span></div>`;
    } else {
        html += retailTop10.map((h, i) =>
            holderRow(h, 'Retail / Trader', 'tag-retail', `#${i + 1}`)
        ).join('');
    }

    list.innerHTML = html;
    panel.classList.add('visible');
}

// ─── FETCH API & SMART FILTER ────────────────────────────────────────────────
async function fetchTopHolders() {
    const status = document.getElementById('api_status');

    if (!detectedCA) {
        status.innerText = '🔴 NO CA DETECTED';
        status.className = 'status-tag tag-off';
        return;
    }

    status.innerText = '⏳ FETCHING…';
    status.className = 'status-tag tag-warn';

    let sysAddr;
    try {
        sysAddr = getSystemAddresses(detectedCA);
    } catch (e) {
        status.innerText = '🔴 INVALID CA';
        status.className = 'status-tag tag-off';
        console.error('PDA derivation failed:', e.message || String(e), e.stack);
        return;
    }

    try {
        const res  = await fetch(`https://api.rugcheck.xyz/v1/tokens/${detectedCA}/report`);
        const data = await res.json();

        if (data.topHolders && data.topHolders.length > 0) {
            // Build lookup sets from RugCheck's own market metadata
            const knownAccts = data.knownAccounts || {};
            const markets    = data.markets       || [];

            // Classify ALL returned holders (RugCheck gives up to 20)
            const allClassified = (data.topHolders || []).map(h => ({
                ...h,
                ...classifyHolder(h, sysAddr, knownAccts, markets),
            }));

            // Top 10 RETAIL holders (system/LP addresses fully excluded)
            const retailTop10 = allClassified
                .filter(h => !h.isSystem)
                .slice(0, 10);

            const retailTop10Pct = retailTop10.reduce((acc, h) => acc + h.pct, 0);
            document.getElementById('in_top10').value = retailTop10Pct.toFixed(2);

            // Panel shows: system addresses found + the actual retail top-10
            const systemHolders = allClassified.filter(h => h.isSystem);
            renderHolderBreakdown(systemHolders, retailTop10);

            status.innerText = '🟢 API CONNECTED';
            status.className = 'status-tag tag-on';
        } else {
            status.innerText = '🟡 NO HOLDER DATA';
            status.className = 'status-tag tag-warn';
        }
    } catch (e) {
        status.innerText = '🔴 API FAILED — MANUAL OK';
        status.className = 'status-tag tag-off';
        console.error('RugCheck API error:', e);
    }
}

// ─── TEXT CLEANER ────────────────────────────────────────────────────────────
// Soul Scan output embeds URLs inside label text, e.g.:
//   👥 Hodls (https://solscan.io/token/CA#holders): 141 • Top: 0%
// We must strip ALL URLs and their surrounding parentheses, date/time headers,
// and leftover empty brackets so the downstream regexes see clean label: value pairs.
function cleanInput(raw) {
    return raw
        // 1. Remove full bracketed URLs — (https://...) — common in Soul Scan
        .replace(/\(\s*https?:\/\/[^)]+\)/gi, '')
        // 2. Remove any remaining bare https/http URLs
        .replace(/https?:\/\/\S+/gi, '')
        // 3. Remove bare domain paths without protocol, e.g. solscan.io/token/...
        .replace(/\b[\w-]+\.(io|com|xyz|app|fun|me|gg|net|org|dev|to)\/\S*/gi, '')
        // 4. Remove Soul Scan / Telegram timestamp header: [DD/MM/YYYY HH:MM AM/PM] Name:
        .replace(/^\[[\d/]+\s+[\d:]+\s*(?:AM|PM)?\]\s*[^:\n]+:/gim, '')
        // 5. Remove standalone timestamps: 12:34 PM or 01:21
        .replace(/\b\d{1,2}:\d{2}(?::\d{2})?(?:\s*[AP]M)?\b/gi, '')
        // 6. Remove standalone date patterns: DD/MM/YYYY, YYYY-MM-DD, etc.
        .replace(/\b\d{1,4}[\/\-.]\d{1,2}[\/\-.]\d{2,4}\b/g, '')
        // 7. Remove leftover empty parens ()
        .replace(/\(\s*\)/g, '')
        // 8. Collapse 3+ newlines to 2
        .replace(/\n{3,}/g, '\n\n')
        .trim();
}

// ─── Number parser: $3.9K → 3900, $1.2M → 1200000, $130 → 130 ───────────────
function parseMoney(str) {
    if (!str) return 0;
    str = str.replace(/,/g, '').trim();
    const m = str.match(/([\d.]+)\s*([KkMmBb])?/);
    if (!m) return 0;
    let n = parseFloat(m[1]);
    const s = (m[2] || '').toUpperCase();
    if (s === 'K') n *= 1_000;
    if (s === 'M') n *= 1_000_000;
    if (s === 'B') n *= 1_000_000_000;
    return n;
}

// ─── Try multiple patterns, return first capture or '' ───────────────────────
function tryMatch(text, ...patterns) {
    for (const re of patterns) {
        const m = text.match(re);
        if (m && m[1] !== undefined) return m[1];
    }
    return '';
}

// ─── PASTE HANDLER — cleans the textarea content immediately on paste ─────────
function handlePaste(event) {
    event.preventDefault();   // stop the default paste
    const pasted = (event.clipboardData || window.clipboardData).getData('text');
    const cleaned = cleanInput(pasted);
    const ta = document.getElementById('rawInput');
    // Insert cleaned text at cursor (replaces selection if any)
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    ta.value = ta.value.slice(0, start) + cleaned + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = start + cleaned.length;
    autoParse();
}

// ─── AUTO-PARSE ──────────────────────────────────────────────────────────────
function autoParse() {
    const raw  = document.getElementById('rawInput').value;
    const text = cleanInput(raw);

    // ── CA Detection ──────────────────────────────────────────────────────────
    // Priority 1: a base58 string that sits ALONE on its own line (Soul Scan
    //             places the CA bare on a dedicated line after all the links).
    // Priority 2: first 43-44 char base58 string found anywhere in clean text.
    // Priority 3: fallback 32-44 chars.
    // Base58 alphabet: 1-9 A-H J-N P-Z a-k m-z  (no 0, O, I, l)
    const b58    = '[1-9A-HJ-NP-Za-km-z]';
    const lineCA = text.match(new RegExp(`^\\s*(${b58}{32,44})\\s*$`, 'm'));
    const anyCA  = text.match(new RegExp(`${b58}{43,44}`));

    const found = (lineCA && lineCA[1]) || (anyCA && anyCA[0]) || '';
    if (found) {
        detectedCA = found;
        document.getElementById('ca_display').innerText = detectedCA;
    }

    // ── Market Cap ────────────────────────────────────────────────────────────
    // Soul Scan: "💰 MC:   $3.9K •🔝$95.8K"  — take the first (current) value
    const mcRaw = tryMatch(text,
        /\bMC\s*:\s*\$?([\d.]+\s*[KkMmBb]?)/i,
        /Market\s*Cap\s*:\s*\$?([\d.]+\s*[KkMmBb]?)/i,
        /Mcap\s*:\s*\$?([\d.]+\s*[KkMmBb]?)/i
    );

    // ── Liquidity ─────────────────────────────────────────────────────────────
    // Soul Scan: "💧 Liq:    $5K [28 SOL]"
    const liqRaw = tryMatch(text,
        /\bLiq(?:uidity)?\s*:\s*\$?([\d.]+\s*[KkMmBb]?)/i
    );

    // ── Volume ────────────────────────────────────────────────────────────────
    // Soul Scan: "📊 Vol:    $130 [1h]"  — no K/M suffix on small values
    const volRaw = tryMatch(text,
        /\bVol(?:ume)?\s*:\s*\$?([\d.]+\s*[KkMmBb]?)/i
    );

    // ── Holders ───────────────────────────────────────────────────────────────
    // Soul Scan after clean: "👥 Hodls : 141 • Top: 0%"
    // The URL was inside the label, so after removal we get "Hodls :"
    const h = tryMatch(text,
        /Hodls?\s*:\s*(\d[\d,]*)/i,
        /Holders?\s*:\s*(\d[\d,]*)/i,
        /Hodls?\s+\S*\s*:\s*(\d[\d,]*)/i
    ).replace(/,/g, '');

    // ── Top holder % ──────────────────────────────────────────────────────────
    // Soul Scan: "• Top: 0%"  (appears on Hodls line)
    const top1 = tryMatch(text,
        /•\s*Top\s*:\s*([\d.]+)%/i,
        /\bTop\s*:\s*([\d.]+)%/i,
        /High(?:est)?\s*:\s*([\d.]+)%/i,
        /Top\s*(?:1|Holder)\s*:\s*([\d.]+)%/i
    );

    // ── Fake volume / wallets ─────────────────────────────────────────────────
    // Soul Scan shows fake VOLUME as "$0" not a wallet count.
    // We set qty=0 and perc=0 for pure-volume format; support old count format too.
    const f_qty = tryMatch(text,
        /Fake\s*:\s*(\d+)\s/i           // old format: "Fake: 12 [3.5%]"
    ).replace(/,/g, '');
    const f_perc = tryMatch(text,
        /Fake[^\n]*\[([\d.]+)%\]/i,     // old format: "Fake: 12 [3.5%]"
        /Fake[^\n]*:\s*([\d.]+)%/i
    );

    // ── Airdrop ───────────────────────────────────────────────────────────────
    // Soul Scan: "┗ Airdrop: 0% 🤍"
    const air = tryMatch(text,
        /Airdrop\s*:\s*([\d.]+)%/i
    );

    // ── Bundle stats ──────────────────────────────────────────────────────────
    // Soul Scan bundle detail section: "💎 Holding: 0%" and "💼 Wallets: 69"
    // Main scan line: "/Bundles : 18 • 110% → 0%" (current holding after arrow)
    const bun_perc = tryMatch(text,
        /💎\s*Holding\s*:\s*([\d.]+)%/i,    // bundle detail section (preferred)
        /Holding\s*:\s*([\d.]+)%/i,          // generic
        /→\s*([\d.]+)%/                      // "110% → 0%" — take value after arrow
    );
    const bun_qty = tryMatch(text,
        /💼\s*Wallets?\s*:\s*(\d+)/i,        // bundle detail section (preferred)
        /Wallets?\s*:\s*(\d+)/i
    ).replace(/,/g, '');

    // ── Set fields ────────────────────────────────────────────────────────────
    document.getElementById('in_mc').value       = mcRaw  ? Math.round(parseMoney(mcRaw))  : '';
    document.getElementById('in_liq').value      = liqRaw ? Math.round(parseMoney(liqRaw)) : '';
    document.getElementById('in_vol').value      = volRaw ? Math.round(parseMoney(volRaw)) : '';
    document.getElementById('in_h').value        = h        || '';
    document.getElementById('in_f_qty').value    = f_qty    || '0';
    document.getElementById('in_f_perc').value   = f_perc   || '0';
    document.getElementById('in_bun_perc').value = bun_perc || '';
    document.getElementById('in_bun_qty').value  = bun_qty  || '';
    document.getElementById('in_air').value      = air      || '';
    document.getElementById('in_top1').value     = top1     || '';
}

// ─── OPEN TELEGRAM BOT ───────────────────────────────────────────────────────
function openBot(el, baseUrl) {
    if (!detectedCA) {
        el.style.animation = 'none';
        el.innerText = '⚠ No CA';
        setTimeout(() => {
            el.innerHTML = el.getAttribute('data-label');
        }, 1200);
        return false;
    }
    el.href = baseUrl + detectedCA;
    return true;
}

// Store original labels for reset
document.querySelectorAll('.btn-bot').forEach(btn => {
    btn.setAttribute('data-label', btn.innerHTML);
});

// ─── COPY CA ─────────────────────────────────────────────────────────────────
function copyCA() {
    if (!detectedCA) return;
    navigator.clipboard.writeText(detectedCA).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.innerText = 'COPIED!';
        setTimeout(() => btn.innerText = 'COPY CA', 1000);
    });
}

// ─── RUN FINAL AUDIT ─────────────────────────────────────────────────────────
function runFinalAudit() {
    const mc      = parseFloat(document.getElementById('in_mc').value)      || 0;
    const liq     = parseFloat(document.getElementById('in_liq').value)     || 0;
    const vol     = parseFloat(document.getElementById('in_vol').value)     || 0;
    const h       = parseInt(document.getElementById('in_h').value)         || 0;
    const f_qty   = parseInt(document.getElementById('in_f_qty').value)     || 0;
    const f_perc  = parseFloat(document.getElementById('in_f_perc').value)  || 0;
    const bun_perc= parseFloat(document.getElementById('in_bun_perc').value)|| 0;
    const bun_qty = parseInt(document.getElementById('in_bun_qty').value)   || 0;
    const air     = parseFloat(document.getElementById('in_air').value)     || 0;
    const top1    = parseFloat(document.getElementById('in_top1').value)    || 0;
    const top10   = parseFloat(document.getElementById('in_top10').value)   || 0;
    const stage   = document.getElementById('stage').value;

    const cleanH = h - f_qty - bun_qty - 1;
    const adjMc  = stage === 'bonded' ? mc : (mc * 0.8);

    const hmc = cleanH / (adjMc / 1000);
    const lmc = mc > 0 ? (liq / mc) * 100 : 0;
    const vl  = liq > 0 ? vol / liq : 0;

    document.getElementById('hmc_val').innerText = hmc.toFixed(2);
    document.getElementById('hmc_eq').innerText  = `(${h}H - ${f_qty}F - ${bun_qty}B - 1) / $${(adjMc/1000).toFixed(1)}k Mcap`;

    document.getElementById('lmc_val').innerText     = lmc.toFixed(1) + '%';
    document.getElementById('lmc_val').style.color   = lmc > 8 ? 'var(--green)' : 'var(--red)';
    document.getElementById('lmc_eq').innerText      = `($${(liq/1000).toFixed(1)}k Liq / $${(mc/1000).toFixed(1)}k Mcap) * 100`;

    let risk = 0;
    let log  = '';
    const check = (name, val, cond, weight) => {
        if (!cond) risk += weight;
        log += `<div class="audit-line"><span>${name} (${val})</span><span class="${cond ? 'status-pass' : 'status-fail'}">${cond ? 'PASS' : 'FAIL'}</span></div>`;
    };

    check('Airdrop < 5%',    air + '%',         air < 5,              10);
    check('L/MC > 8%',       lmc.toFixed(1)+'%',lmc > 8,              10);
    check('Top 10 < 25%',    top10 + '%',       top10 < 25,           2);
    check('Top Holder < 9%', top1 + '%',        top1 < 9,             2);
    check('H/MC > 5.0',      hmc.toFixed(2),    hmc > 5,              2);
    check('Fakes < 15%',     f_perc + '%',      f_perc < 15,          1);
    check('Bundles < 15%',   bun_perc + '%',    bun_perc < 15,        1);
    check('Vol/Liq (2x–9x)', vl.toFixed(1)+'x',(vl >= 2 && vl <= 9), 1);

    document.getElementById('audit_results').innerHTML = log;

    const v = document.getElementById('verdict_box');
    if (air >= 5 || lmc <= 8 || risk > 6) {
        v.innerText = '🚨 ABORT';   v.className = 'verdict-box abort';
    } else if (risk > 0) {
        v.innerText = '🟡 CAUTION'; v.className = 'verdict-box caution';
    } else {
        v.innerText = '🚀 BULLISH'; v.className = 'verdict-box go';
    }
}
