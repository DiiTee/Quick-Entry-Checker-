<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Entry Checker - Smart Filter</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root {
            --bg: #0a0e27; --card: #131837; --input: #1a1f3a;
            --cyan: #00d4ff; --green: #00ff88; --orange: #ffa500; --red: #ff4d4d;
            --text-p: #e8eaf6; --text-s: #9fa8da; --border: #283593;
        }
        body { background: var(--bg); color: var(--text-p); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .dashboard { background: var(--card); width: 100%; max-width: 850px; border-radius: 20px; border: 1px solid var(--border); padding: 25px; box-shadow: 0 0 30px rgba(0,212,255,0.15); }
        h1 { text-align: center; font-size: 1.8rem; background: linear-gradient(135deg, #00d4ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .section-label { color: var(--cyan); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; display: block; }
        textarea { width: 100%; height: 120px; background: var(--input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-s); padding: 15px; box-sizing: border-box; font-family: 'Courier New', monospace; font-size: 0.85rem; outline: none; }
        .ca-container { display: flex; gap: 10px; margin: 15px 0; align-items: center; }
        #ca_display { flex: 1; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-family: monospace; color: var(--green); font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; }
        .edit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .field-group { display: flex; flex-direction: column; }
        .field-group label { font-size: 0.6rem; color: var(--text-s); margin-bottom: 4px; text-transform: uppercase; }
        .field-group input { background: var(--input); border: 1px solid var(--border); color: var(--cyan); padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; border: none; }
        .btn-fetch { background: var(--input); color: var(--cyan); border: 1px solid var(--cyan); margin-bottom: 10px; }
        .btn-audit { background: linear-gradient(135deg, #00d4ff, #00ff88); color: #000; }
        .main-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .metric-box { background: var(--input); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .val { font-size: 2.5rem; font-weight: 800; display: block; }
        .status-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-top: 5px; display: inline-block; }
        .tag-on { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid var(--green); }
        .verdict-box { padding: 20px; border-radius: 12px; text-align: center; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; }
        .go { border: 2px solid var(--green); color: var(--green); }
        .abort { border: 2px solid var(--red); color: var(--red); }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>Quick Entry Checker</h1>

    <textarea id="rawInput" placeholder="Paste scan here..." oninput="autoParse()"></textarea>

    <div class="ca-container">
        <div id="ca_display">No CA Detected</div>
        <button class="btn-main" style="width:auto; padding:10px 20px;" onclick="copyCA()">Copy</button>
    </div>

    <div class="edit-grid">
        <div class="field-group"><label>Mcap ($)</label><input type="number" id="in_mc"></div>
        <div class="field-group"><label>Liq ($)</label><input type="number" id="in_liq"></div>
        <div class="field-group"><label>Airdrop %</label><input type="number" id="in_air"></div>
        <div class="field-group">
            <label>Top 10% (Retail)</label>
            <input type="number" id="in_top10" step="0.01">
            <span id="filter_tag" class="status-tag">READY</span>
        </div>
        <input type="hidden" id="in_h"> <input type="hidden" id="in_f_qty"> <input type="hidden" id="in_f_perc">
        <input type="hidden" id="in_bun_qty"> <input type="hidden" id="in_bun_perc"> <input type="hidden" id="in_top1"> <input type="hidden" id="in_vol">
    </div>

    <div style="margin-top:20px;">
        <button class="btn-main btn-fetch" onclick="smartFetch()">1. Smart Filter API (PDA Calc)</button>
        <button class="btn-main btn-audit" onclick="runFinalAudit()">2. Run Entry Audit</button>
    </div>

    <div class="main-metrics">
        <div class="metric-box"><label>Clean H/MC</label><span id="hmc_val" class="val">0.00</span></div>
        <div class="metric-box"><label>L/MC %</label><span id="lmc_val" class="val">0%</span></div>
    </div>

    <div id="verdict_box" class="verdict-box">STANDBY</div>
</div>

<script>
const PUMP_PROGRAM = "6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P";
const RAYDIUM_AUTH = "5Q544fKrMJu6p6mRnpCqbXmN7E4R56rM6E87t3m2n845";
const PUMPSWAP_PROG = "pAMMBay6oceH9fJKBRHGP5D4bD4sWpmSwMn52FMfXEA";

let detectedCA = "";

function autoParse() {
    const text = document.getElementById('rawInput').value;
    const caMatch = text.match(/[1-9A-HJ-NP-Za-km-z]{32,44}/);
    if(caMatch) { detectedCA = caMatch[0]; document.getElementById('ca_display').innerText = detectedCA; }

    const get = (re, multi=1) => (text.match(re) || [0,0])[1] * multi;
    document.getElementById('in_mc').value = get(/MC:\s+\$([\d.]+)K/i, 1000);
    document.getElementById('in_liq').value = get(/Liq:\s+\$([\d.]+)K/i, 1000);
    document.getElementById('in_air').value = get(/Airdrop:\s+(\d+)%/i);
    document.getElementById('in_h').value = get(/Hodls:\s+(\d+)/i);
    document.getElementById('in_f_qty').value = get(/Fake:\s+(\d+)/i);
    document.getElementById('in_f_perc').value = get(/Fake:\s+\d+\s+\[([\d.]+)%\]/i);
    document.getElementById('in_bun_qty').value = get(/Wallets:\s+(\d+)/i);
    document.getElementById('in_bun_perc').value = get(/Holding:\s+([\d.]+)%/i);
    document.getElementById('in_top1').value = get(/High:\s+([\d.]+)%/i);
    document.getElementById('in_vol').value = get(/Vol:\s+\$([\d.]+)K/i, 1000);
}

async function smartFetch() {
    if(!detectedCA) return alert("Paste CA first");
    const tag = document.getElementById('filter_tag');
    tag.innerText = "CALCULATING PDAs...";
    
    try {
        // 1. Calculate Bonding Curve PDA via solana-web3.js
        const mintPubkey = new solanaWeb3.PublicKey(detectedCA);
        const programPubkey = new solanaWeb3.PublicKey(PUMP_PROGRAM);
        const [bondingCurve] = solanaWeb3.PublicKey.findProgramAddressSync(
            [window.Buffer.from("bonding-curve"), mintPubkey.toBuffer()],
            programPubkey
        );
        const bondingCurveAddress = bondingCurve.toBase58();

        // 2. Fetch RugCheck
        const res = await fetch(`https://api.rugcheck.xyz/v1/tokens/${detectedCA}/report`);
        const data = await res.json();
        
        if(data.topHolders) {
            // 3. Filter Holders using calculated System Addresses
            const retailHolders = data.topHolders.filter(h => {
                const addr = h.address;
                const isSystem = addr === bondingCurveAddress || 
                                 addr === RAYDIUM_AUTH || 
                                 addr === PUMPSWAP_PROG ||
                                 h.address.includes('Raydium') || 
                                 h.address.includes('Bonding');
                return !isSystem;
            });

            const top10RetailSum = retailHolders.slice(0,10).reduce((acc, curr) => acc + curr.pct, 0);
            document.getElementById('in_top10').value = top10RetailSum.toFixed(2);
            
            tag.innerText = "SMART FILTER ACTIVE";
            tag.className = "status-tag tag-on";
        }
    } catch (e) {
        tag.innerText = "FILTER FAILED - MANUAL OK";
        console.error(e);
    }
}

function runFinalAudit() {
    const mc = parseFloat(document.getElementById('in_mc').value);
    const liq = parseFloat(document.getElementById('in_liq').value);
    const h = parseInt(document.getElementById('in_h').value);
    const f_qty = parseInt(document.getElementById('in_f_qty').value);
    const bun_qty = parseInt(document.getElementById('in_bun_qty').value);
    const air = parseFloat(document.getElementById('in_air').value);
    const top10 = parseFloat(document.getElementById('in_top10').value);

    const hmc = (h - f_qty - bun_qty - 1) / (mc / 1000);
    const lmc = (liq / mc) * 100;

    document.getElementById('hmc_val').innerText = hmc.toFixed(2);
    document.getElementById('lmc_val').innerText = lmc.toFixed(1) + "%";

    const v = document.getElementById('verdict_box');
    if (air >= 5 || lmc < 8 || top10 > 25) {
        v.innerText = "🚨 ABORT ENTRY"; v.className = "verdict-box abort";
    } else {
        v.innerText = "🚀 BULLISH ENTRY"; v.className = "verdict-box go";
    }
}

function copyCA() { navigator.clipboard.writeText(detectedCA); }
</script>
</body>
</html>
